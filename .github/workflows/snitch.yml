name: Snitch Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write
  issues: write
  statuses: write # Snitch sets a check status on the PR head SHA
  models: read # free GitHub Models inference via the auto-issued GITHUB_TOKEN

jobs:
  snitch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Snitch
        uses: snitchplugin/snitch-github-action@v1
        with:
          snitch-license-key: ${{ secrets.SNITCH_LICENSE_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          provider: openrouter
          model: sonnet
